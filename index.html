<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asia Group</title>
  </head>
  <body>
    <!-- Hidden Google Translate mount point (language switcher uses the generated .goog-te-combo). -->
    <div id="google_translate_element"></div>
    <div id="root"></div>

    <script>
      // Google Translate Website Translator.
      // Keep this in plain HTML so it runs before the React app looks for `.goog-te-combo`.
      function googleTranslateElementInit() {
        if (!window.google || !window.google.translate) return;
        new window.google.translate.TranslateElement(
          {
            pageLanguage: "ja",
            includedLanguages: "ja,en,vi,ne,bn,ur,hi",
            autoDisplay: false,
          },
          "google_translate_element",
        );
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
